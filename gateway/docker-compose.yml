version: '3.8'

services:
  # MSA Gateway 서비스
  gateway:
    build:
      context: .
      dockerfile: Dockerfile.dev  # 개발용 Dockerfile 사용
    container_name: msa-gateway
    ports:
      - "8080:8000"
    environment:
      - ENVIRONMENT=development
      - PYTHONPATH=/app
      - PYTHONUNBUFFERED=1
    volumes:
      - ./app:/app/app
      - ./requirements.txt:/app/requirements.txt
    networks:
      - msa-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s



networks:
  msa-network:
    driver: bridge 